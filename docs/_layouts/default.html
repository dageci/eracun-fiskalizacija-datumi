<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --primary: #1a5276;
      --primary-light: #2980b9;
      --bg: #ffffff;
      --bg-alt: #f8f9fa;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #dee2e6;
      --success: #27ae60;
      --warning: #e67e22;
      --danger: #c0392b;
      --code-bg: #f4f6f8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
    }

    /* Header */
    .page-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .page-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1.1rem; opacity: 0.9; max-width: 700px; margin: 0 auto; }
    .page-header a { color: white; }

    /* Main content */
    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Typography */
    h1, h2, h3, h4 { color: var(--primary); margin-top: 2rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.8rem; border-bottom: 2px solid var(--primary); padding-bottom: 0.3rem; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.25rem; }
    h4 { font-size: 1.1rem; color: var(--primary-light); }
    p { margin-bottom: 1rem; }

    /* Links */
    a { color: var(--primary-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 0.92rem;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    th {
      background: var(--bg-alt);
      font-weight: 600;
      color: var(--primary);
    }
    tr:nth-child(even) { background: #fafbfc; }

    /* Code */
    code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.88rem;
      font-family: "Fira Code", "Consolas", "Monaco", monospace;
    }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1.25rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1rem 0 1.5rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* Blockquotes */
    blockquote {
      border-left: 4px solid var(--primary-light);
      background: #eef6fc;
      padding: 1rem 1.25rem;
      margin: 1rem 0 1.5rem;
      border-radius: 0 6px 6px 0;
    }
    blockquote p { margin-bottom: 0.5rem; }
    blockquote p:last-child { margin-bottom: 0; }
    blockquote strong { color: var(--primary); }

    /* Lists */
    ul, ol { margin: 0.5rem 0 1rem 1.5rem; }
    li { margin-bottom: 0.3rem; }

    /* Horizontal rules */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* Mermaid diagrams */
    .mermaid {
      text-align: center;
      margin: 1.5rem 0;
      background: var(--bg-alt);
      padding: 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      margin-top: 3rem;
      text-align: center;
      color: var(--text-light);
      font-size: 0.85rem;
    }
    .site-footer a { color: var(--primary-light); }

    /* Responsive */
    @media (max-width: 768px) {
      .page-header { padding: 1.5rem 1rem; }
      .page-header h1 { font-size: 1.5rem; }
      .main-content { padding: 1rem; }
      table { font-size: 0.82rem; }
      th, td { padding: 0.35rem 0.5rem; }
    }

    /* Print */
    @media print {
      .page-header { background: none; color: var(--text); padding: 1rem 0; }
      .main-content { max-width: none; }
      pre { background: var(--bg-alt); color: var(--text); border: 1px solid var(--border); }
    }
  </style>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: true, theme: 'default' });</script>
</head>
<body>

  <header class="page-header">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
    <p style="margin-top: 0.75rem; font-size: 0.9rem;">
      <a href="{{ site.baseurl }}/">Početna</a> ·
      <a href="https://github.com/dageci/eracun-fiskalizacija-datumi">GitHub</a> ·
      <a href="https://github.com/dageci/eracun-fiskalizacija-datumi/discussions">Rasprave</a>
    </p>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      <a href="https://github.com/dageci/eracun-fiskalizacija-datumi">GitHub repo</a> ·
      <a href="https://github.com/dageci/eracun-fiskalizacija-datumi/discussions">Rasprave</a> ·
      <a href="https://github.com/dageci/eracun-fiskalizacija-datumi/issues">Prijavi grešku</a>
    </p>
    <p>Licenca: <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> · Autor: Davor Geci</p>
  </footer>

</body>
</html>
