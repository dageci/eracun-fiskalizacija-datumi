name: Auto changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-changelog
  cancel-in-progress: false

jobs:
  append:
    # Only run if the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Append changelog entry
        id: append
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prTitle  = (pr.title || '').trim();
            const prBody   = pr.body || '';
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;

            // Extract referenced issue numbers from PR body and title.
            // Looks for #123, GH-123, or closing keywords (closes/fixes/resolves #123)
            const refs = new Set();
            const re = /(?:^|[^a-zA-Z0-9_])(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|ref(?:s|erences)?\s+)?#(\d+)/gi;
            const scanText = `${prTitle}\n${prBody}`;
            let m;
            while ((m = re.exec(scanText)) !== null) {
              const n = parseInt(m[1], 10);
              if (!Number.isNaN(n) && n !== prNumber) refs.add(n);
            }

            // Also check for linked issues via the "closing issues references" GraphQL
            try {
              const q = `query($owner:String!, $repo:String!, $num:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$num) {
                    closingIssuesReferences(first: 20) {
                      nodes { number }
                    }
                  }
                }
              }`;
              const data = await github.graphql(q, { owner, repo, num: prNumber });
              const nodes = data
                && data.repository
                && data.repository.pullRequest
                && data.repository.pullRequest.closingIssuesReferences
                && data.repository.pullRequest.closingIssuesReferences.nodes
                || [];
              for (const n of nodes) {
                if (n && typeof n.number === 'number') refs.add(n.number);
              }
            } catch (err) {
              core.warning(`GraphQL closingIssuesReferences failed: ${err.message}`);
            }

            // Use merge date (UTC) for the heading
            const mergedAt = pr.merged_at ? new Date(pr.merged_at) : new Date();
            const date = mergedAt.toISOString().slice(0, 10);

            const issueTag = refs.size > 0
              ? ` (referenced Issue ${Array.from(refs).sort((a,b)=>a-b).map(n => '#'+n).join(', ')})`
              : '';

            const entryLine = `- #${prNumber}: ${prTitle}${issueTag}`;

            const file = 'CHANGELOG.md';
            let content = '';
            if (fs.existsSync(file)) {
              content = fs.readFileSync(file, 'utf8');
            } else {
              content = '# Changelog\n\nAll notable changes to this project will be documented in this file.\n\n';
            }

            // Idempotency: skip if the entry line already exists
            if (content.indexOf(entryLine) !== -1) {
              core.info('Entry already present in CHANGELOG.md — skipping.');
              core.setOutput('changed', 'false');
              return;
            }

            // Find existing "## YYYY-MM-DD" heading; if present, append under it,
            // otherwise insert a new section at the top (after the file header).
            const lines = content.split(/\r?\n/);
            const dateHeading = `## ${date}`;

            // Locate insertion point for a new section: first blank line after the
            // top-of-file header block, or end of file if none found.
            let headerEnd = 0;
            // Skip initial "# Changelog" heading + description
            if (lines[0] && lines[0].startsWith('# ')) {
              headerEnd = 1;
              while (headerEnd < lines.length && lines[headerEnd].trim() !== '') headerEnd++;
              // Skip one blank line
              while (headerEnd < lines.length && lines[headerEnd].trim() === '') headerEnd++;
            }

            const existingIdx = lines.findIndex(l => l.trim() === dateHeading);
            if (existingIdx >= 0) {
              // Append entry at end of that section (before next "## " or EOF)
              let endIdx = existingIdx + 1;
              while (endIdx < lines.length && !lines[endIdx].startsWith('## ')) endIdx++;
              // Trim trailing blank lines inside the section
              let insertAt = endIdx;
              while (insertAt > existingIdx + 1 && lines[insertAt - 1].trim() === '') insertAt--;
              lines.splice(insertAt, 0, entryLine);
            } else {
              // Insert a new section at headerEnd
              const block = [dateHeading, '', entryLine, ''];
              lines.splice(headerEnd, 0, ...block);
            }

            const newContent = lines.join('\n');
            fs.writeFileSync(file, newContent, 'utf8');
            core.info(`Appended to ${file}: ${entryLine}`);
            core.setOutput('changed', 'true');
            core.setOutput('entry', entryLine);

      - name: Commit and push changelog
        if: steps.append.outputs.changed == 'true'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- CHANGELOG.md; then
            echo "Nothing to commit."
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "docs(changelog): ${{ steps.append.outputs.entry }} [skip ci]"
          git push
